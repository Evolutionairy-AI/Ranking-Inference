# Curated prompt set for Experiment 01
# 20 prompts per domain, designed to elicit 500-1500 tokens of substantive output
# Prompts are domain-specific to enable cross-domain analysis in Experiment 02

news:
  - "Write a detailed news article about a major international climate summit, including quotes from world leaders, specific policy proposals, and reactions from environmental groups."
  - "Report on a breakthrough in fusion energy research at a national laboratory. Include technical details, expert commentary, and implications for the energy sector."
  - "Write a news story about a contested election result in a democratic country. Cover the legal challenges, public reactions, and historical precedents."
  - "Report on a major cybersecurity breach affecting a large financial institution. Include timeline, technical details, and regulatory response."
  - "Write a feature article about the economic impact of artificial intelligence on the job market, with statistics, expert interviews, and case studies."
  - "Cover a natural disaster response effort, including casualty figures, government response, international aid, and survivor accounts."
  - "Report on a landmark Supreme Court ruling on digital privacy rights. Include legal analysis, dissenting opinions, and public reaction."
  - "Write a news article about a pharmaceutical company's announcement of a new treatment for Alzheimer's disease, covering clinical trial results and FDA review."
  - "Cover an international trade dispute between two major economies, including tariff details, economic projections, and diplomatic negotiations."
  - "Report on a space exploration milestone, such as a crewed mission to Mars orbit, with technical details and scientific objectives."
  - "Write about a major infrastructure failure in a major city, covering causes, impact on daily life, and government accountability."
  - "Cover a global pandemic preparedness conference, including new protocols, funding commitments, and lessons from past outbreaks."
  - "Report on a whistleblower revelation about government surveillance programs, with legal implications and public debate."
  - "Write about a groundbreaking archaeological discovery that challenges existing historical narratives."
  - "Cover a major labor strike in the technology sector, including worker demands, company response, and economic impact."
  - "Report on emerging regulations for autonomous vehicles after a series of accidents."
  - "Write about a diplomatic crisis involving maritime territorial disputes, including military deployments and international law."
  - "Cover a major educational reform initiative and its effects on standardized testing and curriculum."
  - "Report on a revolutionary renewable energy project, including engineering challenges and community impact."
  - "Write about a cultural controversy surrounding a major museum's decision to repatriate artifacts."

biomedical:
  - "Explain the molecular mechanism of CRISPR-Cas9 gene editing, including the role of guide RNA, PAM sequences, and DNA repair pathways. Discuss recent improvements in base editing and prime editing."
  - "Describe the pathophysiology of Type 2 diabetes, from insulin resistance at the cellular level to systemic metabolic consequences. Include the role of beta-cell dysfunction and glucotoxicity."
  - "Explain how mRNA vaccines work, from lipid nanoparticle delivery to antigen presentation and adaptive immune response. Compare with traditional vaccine approaches."
  - "Describe the mechanisms of antibiotic resistance, including efflux pumps, enzymatic degradation, target modification, and horizontal gene transfer via plasmids."
  - "Explain the neuroscience of Alzheimer's disease, covering amyloid-beta plaques, tau tangles, neuroinflammation, and the cholinergic hypothesis."
  - "Describe the tumor microenvironment and how cancer cells evade immune surveillance. Include the role of checkpoint inhibitors and CAR-T cell therapy."
  - "Explain the molecular basis of sickle cell disease and current therapeutic approaches including hydroxyurea, gene therapy, and bone marrow transplant."
  - "Describe the gut-brain axis, including the role of the microbiome in neurological and psychiatric conditions. Cover recent research on probiotics and mental health."
  - "Explain the mechanisms of epigenetic regulation, including DNA methylation, histone modification, and non-coding RNA. Discuss their role in development and disease."
  - "Describe the pharmacokinetics and pharmacodynamics of monoclonal antibody therapeutics, including half-life, clearance, and target-mediated drug disposition."
  - "Explain the pathogenesis of autoimmune diseases, using lupus as a case study. Cover the role of autoantigens, B-cell hyperactivity, and complement activation."
  - "Describe the biology of stem cells, including pluripotency, differentiation pathways, and current clinical applications in regenerative medicine."
  - "Explain the mechanism of action of GLP-1 receptor agonists in treating obesity and diabetes, including effects on appetite, gastric emptying, and insulin secretion."
  - "Describe the molecular mechanisms of pain signaling, from nociceptor activation to central sensitization. Discuss the opioid crisis and alternative analgesic approaches."
  - "Explain how next-generation sequencing technologies work, from library preparation to bioinformatic analysis. Compare Illumina, PacBio, and Oxford Nanopore platforms."
  - "Describe the pathophysiology of heart failure, including systolic vs diastolic dysfunction, neurohormonal activation, and current pharmacological management."
  - "Explain the role of the complement system in innate immunity, including the classical, alternative, and lectin pathways."
  - "Describe mitochondrial dysfunction in neurodegenerative diseases, covering oxidative stress, mitophagy, and therapeutic targets."
  - "Explain the mechanisms of viral immune evasion, using influenza and HIV as examples. Cover antigenic drift, shift, and latency."
  - "Describe the molecular basis of pharmacogenomics and how genetic variation in CYP450 enzymes affects drug metabolism and clinical outcomes."

legal:
  - "Analyze the legal framework for regulating artificial intelligence in the European Union, including the AI Act's risk-based classification system, prohibited practices, and enforcement mechanisms."
  - "Explain the doctrine of qualified immunity in U.S. civil rights litigation, including its origins, current application, and recent reform proposals."
  - "Discuss the legal principles governing international arbitration, including the New York Convention, party autonomy, and enforcement of arbitral awards."
  - "Analyze the tension between copyright law and generative AI, including issues of training data, fair use, and authorship of AI-generated works."
  - "Explain the legal framework for data protection under GDPR, including lawful bases for processing, data subject rights, and cross-border transfer mechanisms."
  - "Discuss the evolution of antitrust law in the technology sector, including market definition challenges, network effects, and recent enforcement actions."
  - "Analyze the legal principles governing environmental liability, including the polluter pays principle, strict liability, and Superfund litigation."
  - "Explain the constitutional law surrounding government surveillance and the Fourth Amendment, including the third-party doctrine and digital privacy."
  - "Discuss the legal framework for intellectual property protection of pharmaceutical innovations, including patent thickets, Hatch-Waxman, and TRIPS."
  - "Analyze the legal principles governing corporate governance, including fiduciary duties, the business judgment rule, and shareholder derivative actions."
  - "Explain the law of armed conflict and rules of engagement, including distinction, proportionality, and military necessity under the Geneva Conventions."
  - "Discuss the legal challenges of autonomous weapons systems under international humanitarian law."
  - "Analyze the regulatory framework for cryptocurrency and digital assets, including securities classification, AML requirements, and stablecoin regulation."
  - "Explain the legal principles governing class action litigation, including certification requirements, adequacy of representation, and settlement procedures."
  - "Discuss the evolution of employment discrimination law, including disparate treatment, disparate impact, and the burden-shifting framework."
  - "Analyze the legal framework for international trade disputes under the WTO, including the dispute settlement mechanism and appellate body crisis."
  - "Explain the legal principles governing freedom of expression on social media platforms, including Section 230 and content moderation."
  - "Discuss the law of mergers and acquisitions, including due diligence, representations and warranties, and material adverse change clauses."
  - "Analyze the legal framework for refugee protection under international law, including the 1951 Convention and non-refoulement."
  - "Explain the principles of contract interpretation, including the parol evidence rule, implied terms, and the duty of good faith."

code:
  - "Implement a B-tree data structure in Python with insert, search, and delete operations. Include proper node splitting and merging logic with detailed comments."
  - "Write a Python implementation of the Raft consensus algorithm for distributed systems, including leader election, log replication, and safety guarantees."
  - "Implement a garbage collector using the mark-and-sweep algorithm in Python, with support for cyclic references and generational collection."
  - "Write a Python HTTP/2 server from scratch that handles multiplexed streams, header compression (HPACK), and flow control."
  - "Implement a lock-free concurrent hash map in Python using compare-and-swap semantics, with benchmarks against threading.Lock-based alternatives."
  - "Write a complete implementation of the RSA cryptosystem in Python, including key generation, encryption, decryption, and digital signatures."
  - "Implement a SQL query parser and optimizer in Python that handles SELECT, JOIN, WHERE, and GROUP BY clauses with a cost-based optimization strategy."
  - "Write a neural network framework from scratch in Python with automatic differentiation, supporting dense layers, convolutions, and backpropagation."
  - "Implement a memory allocator in Python that simulates malloc/free with first-fit, best-fit, and buddy system strategies. Include fragmentation analysis."
  - "Write a Python implementation of the PageRank algorithm with sparse matrix operations, convergence detection, and visualization of the link graph."
  - "Implement a regular expression engine in Python supporting concatenation, alternation, Kleene star, character classes, and capturing groups."
  - "Write a Python compiler for a simple programming language that generates bytecode, including lexer, parser, AST, and virtual machine."
  - "Implement a distributed key-value store in Python with consistent hashing, replication, and eventual consistency via vector clocks."
  - "Write a Python implementation of the A* pathfinding algorithm with multiple heuristics, grid-based and graph-based maps, and visualization."
  - "Implement a database transaction manager in Python with ACID properties, write-ahead logging, and two-phase locking."
  - "Write a Python implementation of the FFT (Fast Fourier Transform) algorithm with applications to signal processing and polynomial multiplication."
  - "Implement a rate limiter in Python using the token bucket algorithm, sliding window, and leaky bucket approaches. Include thread-safe variants."
  - "Write a Python implementation of a red-black tree with all rotation cases, insertion, deletion, and in-order traversal visualization."
  - "Implement a WebSocket server in Python from scratch, handling the HTTP upgrade, frame parsing, masking, and ping/pong control frames."
  - "Write a Python implementation of the LRU cache with O(1) operations using a hash map and doubly linked list, with TTL support."

social_media:
  - "Write 20 diverse social media posts about a trending tech product launch, including different tones: excited fan, skeptical critic, meme-style humor, and influencer review."
  - "Generate a Twitter thread explaining quantum computing to a general audience, using analogies, casual language, and emoji."
  - "Write a series of Reddit comments debating the merits of remote work vs office work, including personal anecdotes, statistics references, and heated disagreements."
  - "Create Instagram captions for a travel influencer visiting Tokyo, mixing English with common internet slang, hashtags, and casual abbreviations."
  - "Write YouTube comment section responses to a controversial political video, capturing the range from thoughtful analysis to trolling."
  - "Generate TikTok video script narrations about cooking hacks, using Gen-Z slang, verbal fillers, and casual conversational style."
  - "Write a series of Discord messages in a gaming community discussing a new patch update, including slang, abbreviations, and memes."
  - "Create LinkedIn posts from different professionals reacting to an AI industry announcement, ranging from corporate-speak to genuine excitement."
  - "Write Hacker News comments discussing a new programming language, including technical critique, comparisons, and community drama."
  - "Generate tweets about a major sports event, capturing live reactions, hot takes, memes, and post-game analysis."
  - "Write Reddit AITA posts and responses about workplace conflicts, capturing authentic internet discourse patterns."
  - "Create a series of product review comments on Amazon ranging from genuine detailed reviews to clearly fake ones."
  - "Write Twitch chat messages during a popular streamer's broadcast, including emotes, copypasta, and chat culture."
  - "Generate Facebook community group posts about local issues, including neighborhood drama, event planning, and complaint threads."
  - "Write a Twitter debate thread about cryptocurrency, with bulls, bears, maximalists, and skeptics all participating."
  - "Create Mastodon/Bluesky posts discussing social media platform migration, comparing features and communities."
  - "Write Stack Overflow questions and answers that capture the full spectrum from well-researched to lazy homework dumps."
  - "Generate WhatsApp group chat messages planning a group vacation, with logistical debates, emoji usage, and voice message references."
  - "Write a series of Substack newsletter excerpts about media criticism, mixing formal analysis with internet culture references."
  - "Create viral tweet threads about everyday observations that accumulate engagement through relatable humor and hot takes."
