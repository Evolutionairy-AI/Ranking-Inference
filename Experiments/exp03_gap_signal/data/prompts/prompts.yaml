# Experiment 03: Prompts for confidence-grounding gap analysis
#
# Three conditions:
# 1. Factual: prompts about well-known entities that should elicit accurate text
# 2. Hallucination-inducing: prompts that push the model toward fabrication
# 3. Synthetic: factual prompts whose outputs get post-processed with entity injection

factual:
  # Well-known topics where the model should generate accurate, verifiable text
  - "Describe the structure and function of DNA, including the double helix, base pairing, and replication mechanism."
  - "Explain how photosynthesis works in plants, covering the light-dependent and light-independent reactions."
  - "Describe the causes and major events of World War I, from the assassination of Archduke Franz Ferdinand to the Treaty of Versailles."
  - "Explain Newton's three laws of motion with everyday examples for each law."
  - "Describe the water cycle, including evaporation, condensation, precipitation, and collection."
  - "Explain how the human immune system fights infections, covering innate and adaptive immunity."
  - "Describe the process of plate tectonics and how it causes earthquakes and volcanic eruptions."
  - "Explain the basic principles of supply and demand in economics with concrete examples."
  - "Describe the life cycle of a star, from nebula formation to its end state as a white dwarf, neutron star, or black hole."
  - "Explain how the internet works, from DNS resolution to HTTP requests to packet routing."
  - "Describe the structure of the United States federal government, including the three branches and their checks and balances."
  - "Explain the periodic table of elements, including how elements are organized by atomic number, electron configuration, and chemical properties."
  - "Describe the process of cellular respiration, including glycolysis, the Krebs cycle, and oxidative phosphorylation."
  - "Explain how vaccines work, including the role of antigens, antibodies, and immune memory."
  - "Describe the major events of the French Revolution from 1789 to 1799."
  - "Explain the theory of evolution by natural selection as proposed by Charles Darwin."
  - "Describe how a combustion engine works in a car, from fuel injection to exhaust."
  - "Explain the basic principles of genetics, including dominant and recessive alleles, Punnett squares, and Mendelian inheritance."
  - "Describe the solar system, including the eight planets, their order, and key characteristics of each."
  - "Explain how electricity is generated in a nuclear power plant, from fission to the electrical grid."
  - "Describe the history and significance of the Rosetta Stone in deciphering Egyptian hieroglyphics."
  - "Explain how GPS navigation works, including satellite triangulation and signal timing."
  - "Describe the structure of an atom, including protons, neutrons, electrons, and electron shells."
  - "Explain the greenhouse effect and its role in Earth's climate system."
  - "Describe how antibiotics work against bacterial infections and why antibiotic resistance develops."
  - "Explain the Pythagorean theorem and provide a geometric proof."
  - "Describe the major achievements of the Apollo space program."
  - "Explain how the human digestive system processes food from ingestion to absorption."
  - "Describe the principles of democracy as practiced in ancient Athens."
  - "Explain how nuclear fusion works in the Sun and why it produces energy."

hallucination_inducing:
